<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmácia 24h</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💊 Rastreamento de Pedido</h1>

    <form onsubmit="event.preventDefault();">
      <input type="text" id="codigo" placeholder="Digite o código do pedido">
      <button type="button" id="buscar">Buscar</button>
    </form>

    <div id="resultado" class="resultado">
      <p>Produto: <strong id="produto"></strong></p>
      <p>Status: <span id="status" class="status"></span></p>

      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>
    </div>

    <div id="erro" class="resultado">
      <h2>❌ Produto não encontrado</h2>
      <p>Verifique o código e tente novamente.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
